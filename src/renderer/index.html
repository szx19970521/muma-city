<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>牧马城市</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://*.posthog.com https://*.i.posthog.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' blob: https://*.posthog.com https://*.i.posthog.com"
    />
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background: #05070d;
      }

      body {
        color: #f8fafc;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      .html-startup-page {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        min-height: 100vh;
        padding: 32px;
        box-sizing: border-box;
        overflow: hidden;
        background: #05070d;
      }

      .html-startup-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        text-align: center;
      }

      .html-startup-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 72px;
        height: 72px;
        border: 1px solid rgba(245, 197, 24, 0.46);
        border-radius: 18px;
        background: rgba(245, 197, 24, 0.11);
        color: #f5c518;
        font-size: 22px;
        font-weight: 900;
      }

      .html-startup-brand h1 {
        margin: 0;
        color: #f5c518;
        font-size: 44px;
        line-height: 1.05;
        font-weight: 900;
        letter-spacing: 0;
      }

      .html-startup-brand p {
        margin: 0;
        color: rgba(248, 250, 252, 0.72);
        font-size: 14px;
        font-weight: 700;
      }

      .html-startup-progress {
        position: relative;
        width: min(280px, 72vw);
        height: 3px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.22);
      }

      .html-startup-progress span {
        position: absolute;
        top: 0;
        bottom: 0;
        left: -42%;
        width: 42%;
        border-radius: inherit;
        background: #f5c518;
        animation: htmlStartupProgress 1.2s ease-in-out infinite;
      }

      @keyframes htmlStartupProgress {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(340%);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main
        class="html-startup-page"
        role="status"
        aria-live="polite"
        data-testid="html-startup"
      >
        <section class="html-startup-brand" aria-label="牧马城市启动中">
          <span class="html-startup-mark">牧马</span>
          <h1>牧马城市</h1>
          <p>正在启动城市工作台</p>
        </section>
        <div class="html-startup-progress" aria-hidden="true">
          <span></span>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
